<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You</title>
  <style>
    body {
      background: #0b0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .check-icon {
      font-size: 4rem;
      color: #00ffae;
      margin-bottom: 20px;
      animation: pop 0.6s ease;
    }

    h1 {
      color: #9b51e0;
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      font-size: 1.15rem;
      max-width: 600px;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      color: #00e0ff;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      border: 1px solid #00e0ff;
      padding: 10px 20px;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: #00e0ff;
      color: #0b0f1a;
      box-shadow: 0 0 10px #00e0ff;
    }

    @keyframes pop {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="check-icon">✅</div>
  <h1>Resume Submitted Successfully!</h1>
  <p>Thank you for applying. Our team will review your resume and get in touch with you if your profile matches our requirements.</p>
  <a href="index.html">← Back to Home</a>
</body>
</html>
